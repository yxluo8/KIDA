name: kida
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pytorch=2.1.2
  - torchvision=0.16.2
  - torchaudio=2.1.2
  - pytorch-cuda=11.8
  
  - ffmpeg=6.1.1
  - scikit-learn
  - scipy
  - networkx
  - sympy
  - pillow
  - requests
  - pytest
  
  - pip
  - pip:
      - absl-py==2.3.1
      - addict==2.4.0
      - causal-conv1d==1.4.0
      - mamba-ssm==1.2.0
      
      #  if fail to install causal-conv1d and mamba-ssm, 
      #   please install them separately using the following commands:
      #   pip install causal-conv1d==1.4.0
      #   pip install mamba-ssm==1.2.0
      
      - einops==0.8.1
      - ffmpeg-python==0.2.0
      - huggingface-hub==0.35.3
      - lightning-utilities==0.15.2
      - matplotlib==3.9.4
      - mmengine==0.7.0
      - numpy==1.26.4
      - pandas==2.3.3
      - pyyaml==6.0.3
      - safetensors==0.6.2
      - seaborn==0.13.2
      - tensorboard==2.20.0
      - timm==1.0.20
      - torchmetrics==1.8.2
      - tqdm==4.67.1
      - transformers==4.30.2